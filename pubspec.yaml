name: equran_app
description: Aplikasi eQuran - Arah Baru Selayar
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  audio_service: ^0.18.0
  audio_session: ^0.1.21
  cupertino_icons: ^1.0.8
  dio: ^5.5.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^18.0.0
  flutter_localizations:
    sdk: flutter
  fpdart: ^1.1.0
  freezed_annotation: ^3.1.0
  geocoding: ^3.0.0
  geolocator: ^13.0.4
  get_it: ^9.2.1
  go_router: ^17.2.3
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.2.0
  injectable: ^3.0.0
  intl: ^0.20.1
  json_annotation: ^4.12.0
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  timezone: ^0.9.4
  url_launcher: ^6.3.2

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  hive_ce_generator: ^1.8.0
  injectable_generator: ^3.0.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
