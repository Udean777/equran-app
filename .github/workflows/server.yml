name: Server CI/CD

# ─── Trigger ────────────────────────────────────────────────────────────────
# PR ke main/dev   → test Python backend
# Push ke main/dev → test + auto-deploy ke Render
on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'server/**'
      - 'render.yaml'
      - '.github/workflows/server.yml'

# ─── Concurrency ────────────────────────────────────────────────────────────
concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB — Test Python Backend
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test Python Backend
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'server/requirements.txt'

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint with Ruff
        run: |
          pip install ruff
          cd server
          ruff check . --select I,E,F,W --ignore E501

      # ── Test ────────────────────────────────────────────────────────────────
      - name: Run pytest
        run: |
          cd server
          PYTHONPATH=. pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB — Deploy to Render (only on push to main/dev)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Deploy via Render Blueprint ─────────────────────────────────────────
      # Render akan auto-deploy dari repo jika ada render.yaml
      # Endpoint: https://equran-hafalan-api.onrender.com
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deployment..."
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Deploy triggered successfully"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL not set. Deploy skipped."
            echo "Set this secret in GitHub repo settings to enable auto-deploy."
          fi
