name: CI

# ─── Trigger ────────────────────────────────────────────────────────────────
# PR ke main        → analyze + lint + test (wajib pass sebelum merge)
# Push/merge ke main → analyze + lint + test (validasi ulang setelah merge)
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# ─── Concurrency ────────────────────────────────────────────────────────────
# Batalkan run lama jika ada push baru di PR yang sama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true



jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB — Analyze, Lint & Test
  # ═══════════════════════════════════════════════════════════════════════════
  check:
    name: Analyze, Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Flutter version
        run: flutter --version

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Code generation ─────────────────────────────────────────────────────
      # Wajib sebelum analyze agar file .g.dart & .freezed.dart up-to-date
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Format check ────────────────────────────────────────────────────────
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      # ── Analyze (very_good_analysis) ────────────────────────────────────────
      - name: Dart analyze
        run: flutter analyze --fatal-infos --fatal-warnings


      # ── Coverage report (opsional, tampil di PR summary) ────────────────────
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 7
