name: Release

# ─── Trigger ────────────────────────────────────────────────────────────────
# CI: push tag v* → build & publish GitHub Release
# CD: workflow_dispatch manual saja (prototipe, belum aktif)
on:
  push:
    tags:
      - "v*"

# ─── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write # untuk membuat GitHub Release

# ─── Env global ─────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: "3.32.0"
  JAVA_VERSION: "17"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build APK (split ABI) + AAB
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Code generation ─────────────────────────────────────────────────────
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Keystore ────────────────────────────────────────────────────────────
      # Secret yang dibutuhkan (set di GitHub → Settings → Secrets):
      #   KEYSTORE_BASE64     : base64 dari file .jks / .keystore
      #   KEYSTORE_PASSWORD   : storePassword
      #   KEY_ALIAS           : keyAlias
      #   KEY_PASSWORD        : keyPassword
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Patch build.gradle.kts agar pakai key.properties ────────────────────
      # Hanya dijalankan jika signingConfig masih pakai "debug" (default repo)
      - name: Patch signingConfig → release keystore
        run: |
          sed -i 's/signingConfig = signingConfigs.getByName("debug")/signingConfig = signingConfigs.getByName("release")/' \
            android/app/build.gradle.kts

          # Inject signingConfigs block sebelum buildTypes jika belum ada
          if ! grep -q 'signingConfigs {' android/app/build.gradle.kts; then
            sed -i '/buildTypes {/i \
            signingConfigs {\
                release {\
                    val props = java.util.Properties()\
                    props.load(rootProject.file("key.properties").inputStream())\
                    storeFile = file(props["storeFile"] as String)\
                    storePassword = props["storePassword"] as String\
                    keyAlias = props["keyAlias"] as String\
                    keyPassword = props["keyPassword"] as String\
                }\
            }\
            ' android/app/build.gradle.kts
          fi

      # ── Build APK split per ABI ──────────────────────────────────────────────
      - name: Build APK (split ABI)
        run: make build-android-apk

      # ── Build AAB ───────────────────────────────────────────────────────────
      - name: Build AAB
        run: make build-android-aab

      # ── Rename artifacts ────────────────────────────────────────────────────
      - name: Rename artifacts
        run: |
          TAG="${{ github.ref_name }}"
          cd build/app/outputs/flutter-apk

          mv app-armeabi-v7a-release.apk  equran-${TAG}-armeabi-v7a.apk  || true
          mv app-arm64-v8a-release.apk    equran-${TAG}-arm64-v8a.apk    || true
          mv app-x86_64-release.apk       equran-${TAG}-x86_64.apk       || true

          cd -
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/equran-${TAG}.aab

          # Zip debug symbols untuk crash deobfuscation
          zip -r dist-symbols.zip build/debug-info/android/

      # ── Upload artifacts (antar job) ─────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk/equran-*.apk
          retention-days: 7

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab
          path: build/app/outputs/bundle/release/equran-*.aab
          retention-days: 7

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols
          path: dist-symbols.zip
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks
          path: dist/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab
          path: dist/

      - name: Download debug symbols
        uses: actions/download-artifact@v4
        with:
          name: symbols
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: eQuran ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }} # v1.0.0-beta → prerelease
          generate_release_notes: true
          files: |
            dist/equran-*.apk
            dist/equran-*.aab
            dist/dist-symbols.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — CD: Deploy ke Play Console (PROTOTIPE — tidak aktif)
  # Aktifkan nanti dengan menambahkan trigger atau uncomment workflow_dispatch
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-play-console:
    name: "[PROTO] Deploy to Play Console"
    needs: build
    runs-on: ubuntu-latest
    # ── DISABLED: job ini tidak akan pernah jalan ────────────────────────────
    if: false

    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab
          path: dist/

      # Secret tambahan yang dibutuhkan:
      #   PLAY_SERVICE_ACCOUNT_JSON : isi JSON service account Google Play API
      - name: Upload to Play Console (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: id.ssajudn.equran_app
          releaseFiles: dist/equran-*.aab
          track: internal
          status: completed
          # whatsNewDirectory: distribution/whatsnew   # opsional: release notes per locale
